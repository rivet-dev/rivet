apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: rivet-engine
  labels:
    app: pgbouncer
    service: engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
        service: engine
    spec:
      containers:
      - name: pgbouncer
        image: edoburu/pgbouncer:latest
        ports:
        - containerPort: 5432
          name: pgbouncer
          protocol: TCP
        env:
        # DB_PASSWORD is declared first so DATABASE_URL can reference it via $(DB_PASSWORD).
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        # Embeds the plaintext password so pgbouncer can perform SCRAM-SHA-256 with postgres 17.
        - name: DATABASE_URL
          value: "postgresql://postgres:$(DB_PASSWORD)@postgres:5432/rivet"
        envFrom:
        - configMapRef:
            name: pgbouncer-config
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
