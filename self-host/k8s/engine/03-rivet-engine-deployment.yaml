apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: rivet-engine
    component: rivet-engine
    service: engine
  name: rivet-engine
  namespace: rivet-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rivet-engine
  template:
    metadata:
      labels:
        app: rivet-engine
        component: rivet-engine
        service: engine
    spec:
      serviceAccountName: rivet-engine
      terminationGracePeriodSeconds: 25
      containers:
      - name: rivet-engine
        image: rivetdev/engine:latest
        args:
        - start
        env:
        - name: RIVET_CONFIG_PATH
          value: /etc/rivet/config.jsonc
        - name: RIVET__AUTH__ADMIN_TOKEN
          valueFrom:
            secretKeyRef:
              name: rivet-secrets
              key: admin-token
        ports:
        - containerPort: 6420
          name: guard
          protocol: TCP
        - containerPort: 6421
          name: api-peer
          protocol: TCP
        resources:
          requests:
            cpu: 2000m
            memory: 2Gi
          limits:
            cpu: 3000m
            memory: 4Gi
        startupProbe:
          httpGet:
            path: /health
            port: 6421
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 6421
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        livenessProbe:
          httpGet:
            path: /health
            port: 6421
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
        volumeMounts:
        - mountPath: /etc/rivet
          name: config
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: engine-config
