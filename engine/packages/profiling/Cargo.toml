[package]
name = "rivet-profiling"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow.workspace = true
gas.workspace = true
rivet-config.workspace = true
rivet-pools.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
universalpubsub.workspace = true

[target.'cfg(all(any(target_os = "linux", target_os = "macos"), any(target_arch = "x86_64", target_arch = "aarch64")))'.dependencies]
pyroscope = { workspace = true, features = ["backend-pprof-rs"] }
