[package]
name = "depot-client"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
workspace = "../../../"
description = "Depot-backed native SQLite VFS client"

[lib]
crate-type = ["lib"]

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
crossbeam-channel = "0.5"
libsqlite3-sys = { version = "0.30", features = ["bundled"] }
tokio.workspace = true
tracing.workspace = true
getrandom = "0.2"
rivet-envoy-protocol.workspace = true
depot-client-types.workspace = true
depot.workspace = true
moka = { version = "0.12", default-features = false, features = ["sync"] }
parking_lot.workspace = true
scc.workspace = true

[dev-dependencies]
depot = { workspace = true, features = ["test-faults"] }
futures-util.workspace = true
gas.workspace = true
rivet-config.workspace = true
rivet-pools.workspace = true
rivet-test-deps.workspace = true
sha2.workspace = true
tempfile.workspace = true
universaldb.workspace = true
universalpubsub.workspace = true
