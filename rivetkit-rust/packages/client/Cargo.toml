[package]
name = "rivetkit-client"
version = "0.9.0-rc.2"
description = "Rust client for RivetKit - the Stateful Serverless Framework for building AI agents, realtime apps, and game servers"
edition = "2021"
authors = ["Rivet Gaming, LLC <developer@rivet.dev>"]
license = "Apache-2.0"
homepage = "https://rivet.dev"
repository = "https://github.com/rivet-dev/rivet"

[dependencies]
anyhow = "1.0"
base64 = "0.22.1"
bytes = { workspace = true }
futures-util = "0.3.31"
parking_lot.workspace = true
reqwest = { version = "0.12.12", default-features = false, features = ["json", "charset", "http2", "macos-system-configuration", "rustls-tls-native-roots", "rustls-tls-webpki-roots"] }
rivetkit-client-protocol = { path = "../client-protocol" }
scc.workspace = true
serde = { version = "1.0", features = ["derive"] }
serde_bare = "0.5.0"
serde_cbor = "0.11.2"
serde_json = "1.0"
tokio =  { version = "1", features = ["full"] }
tokio-tungstenite = { version = "0.26.1", features = ["rustls-tls-native-roots", "rustls-tls-webpki-roots", "handshake"] }
tracing = "0.1.41"
tungstenite = "0.26.2"
urlencoding = "2.1.3"
vbare = "0.0.4"

[dev-dependencies]
axum = { workspace = true, features = ["ws"] }
tracing-subscriber = { version = "0.3.19", features = ["env-filter", "std", "registry"]}
tempfile = "3.10.1"
tokio-test = "0.4.3"
fs_extra = "1.3.0"
portpicker = "0.1.1"
