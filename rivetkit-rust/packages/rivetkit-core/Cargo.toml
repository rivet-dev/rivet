[package]
name = "rivetkit-core"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
workspace = "../../../"
autotests = false

[features]
default = ["native-runtime"]
native-runtime = [
	"dep:nix",
	"dep:reqwest",
	"rivet-envoy-client/native-transport",
]
wasm-runtime = ["rivet-envoy-client/wasm-transport"]
sqlite = ["sqlite-local"]
sqlite-local = ["native-runtime", "dep:async-trait", "dep:depot-client"]
sqlite-remote = []

[dependencies]
anyhow.workspace = true
async-trait = { workspace = true, optional = true }
base64.workspace = true
ciborium.workspace = true
futures.workspace = true
http.workspace = true
nix = { workspace = true, optional = true }
parking_lot.workspace = true
prometheus.workspace = true
rand.workspace = true
reqwest = { workspace = true, optional = true }
rivet-error.workspace = true
rivet-envoy-client = { workspace = true, default-features = false }
rivetkit-shared-types.workspace = true
rivetkit-actor-persist.workspace = true
rivetkit-client-protocol.workspace = true
rivetkit-inspector-protocol.workspace = true
depot-client-types.workspace = true
depot-client = { workspace = true, optional = true }
scc.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_bare.workspace = true
serde_bytes.workspace = true
subtle.workspace = true
tokio-util.workspace = true
tracing.workspace = true
url.workspace = true
vbare.workspace = true

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio.workspace = true
uuid.workspace = true

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }
js-sys = "0.3"
tokio = { version = "1.44.0", default-features = false, features = ["macros", "rt", "sync", "time"] }
uuid = { version = "1.11.0", features = ["v4", "serde", "js"] }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-time = "1.1"

[dev-dependencies]
portpicker.workspace = true
tempfile.workspace = true
tokio = { workspace = true, features = ["test-util"] }
tracing-subscriber.workspace = true

[[test]]
name = "integration"
path = "tests/integration.rs"
