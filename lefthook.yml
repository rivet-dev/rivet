pre-commit:
  parallel: true
  commands:
    cargo-lock:
      run: cargo metadata --locked --no-deps >/dev/null
      tags: lockfile
    pnpm-lock:
      run: pnpm install --frozen-lockfile --ignore-scripts
      tags: lockfile
    cargo-fmt:
      run: cargo fmt --all
      tags: formatting
      stage_fixed: true
