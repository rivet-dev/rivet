pre-commit:
  parallel: true
  commands:
    cargo-lock:
      run: cargo metadata --format-version 1 --locked --no-deps >/dev/null
      tags: lockfile
    pnpm-lock:
      run: pnpm install --frozen-lockfile --ignore-scripts
      tags: lockfile
    agent-fmt:
      run: pnpm fmt:agent -- --staged
      tags: formatting
      stage_fixed: true
