name: Publish compute-hello-world

on:
  push:
    branches: [main]
    paths:
      - docker/compute-hello-world/**
      - .github/workflows/compute-hello-world.yml
  pull_request:
    paths:
      - docker/compute-hello-world/**
      - .github/workflows/compute-hello-world.yml
  workflow_dispatch:

concurrency:
  group: compute-hello-world-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_CI_USERNAME }}
          password: ${{ secrets.DOCKER_CI_ACCESS_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: docker/compute-hello-world
          file: docker/compute-hello-world/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: |
            rivetdev/compute-hello-world:latest
            rivetdev/compute-hello-world:${{ github.sha }}
