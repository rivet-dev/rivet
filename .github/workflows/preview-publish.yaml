# =============================================================================
# Preview Publish
# =============================================================================
#
# Builds and publishes preview versions of all packages on every PR and push
# to main. Builds are performed in DEBUG mode for speed (~5 min vs ~15 min
# for release). Preview versions are published to npm with a PR-scoped tag:
#
#   Version: {base}-pr.{pr_number}.{sha}  (PRs)
#            {base}-main.{sha}            (main)
#   Tag:     pr-{pr_number}               (PRs)
#            main                         (main)
#
# Install with:
#   npm install rivetkit@pr-4600
#
# ============================================================================
# PRIOR ART
# ============================================================================
#
# This workflow follows conventions from the napi-rs ecosystem. Similar patterns
# used by:
#
# - @next/swc (Next.js):
#   https://github.com/vercel/next.js/tree/canary/packages/next-swc
# - swc-project/swc:
#   https://github.com/swc-project/swc/blob/main/.github/workflows/publish-npm-package.yml
# - oxc-project/oxc:
#   https://github.com/oxc-project/oxc/tree/main/.github/workflows
# - web-infra-dev/rspack:
#   https://github.com/web-infra-dev/rspack/blob/main/.github/workflows/release.yml
# - biomejs/biome:
#   https://github.com/biomejs/biome/tree/main/.github/workflows
#
# Standard pattern: N parallel jobs (one per target triple), each producing a
# platform-specific .node file; final publish job assembles optionalDependencies
# on the meta package and publishes all platform packages + the meta package to
# npm under a pre-release dist-tag.
#
# ============================================================================
# ALPINE LINUX & NODE.JS SHARP EDGES
# ============================================================================
#
# Node native addons must match the libc of the Node binary loading them.
# A glibc-linked .node file cannot be loaded by musl-linked Node (Alpine) and
# vice versa.
#
# - Official Node from nodejs.org: glibc-linked
# - NodeSource apt packages: glibc-linked
# - node:22-slim / node:22-bookworm Docker: glibc-linked (glibc 2.36)
# - node:22-alpine Docker: musl-linked
# - Alpine Linux `apk add nodejs`: musl-linked
#
# To cover both, we ship platform-specific packages:
#   @rivetkit/rivetkit-native-linux-x64-gnu   (glibc; most Linux distros)
#   @rivetkit/rivetkit-native-linux-x64-musl  (musl; Alpine, distroless, scratch)
# The generated index.js loader uses napi-rs's isMusl() heuristic to pick one
# at runtime. This mirrors what swc, oxc, rspack all do.
#
# glibc version:
# We build the glibc variant on Debian bullseye (glibc 2.31) — binaries built
# against an older glibc forward-compatible to newer ones. This covers
# Debian 11+, Ubuntu 20.04+, RHEL 9+, Amazon Linux 2023+.
#
# musl version:
# musl has weaker ABI guarantees than glibc. We build on a pinned musl-cross
# toolchain (musl.cc aarch64, cross-tools x86_64) and accept that users on
# very old Alpine (3.17-) or very new edge Alpine may hit occasional mismatches.
# This is the same tradeoff napi-rs's lts-alpine base image makes.
#
# MinGW vs MSVC for Windows:
# Node.js on Windows is built with MSVC, and the napi-rs convention is MSVC
# addons. We use MinGW to share a single Docker base image with the engine
# build. MinGW-built .node files load into MSVC Node.js as long as libgcc,
# libstdc++, and winpthreads are statically linked (we enforce this via
# RUSTFLAGS). swc historically shipped MinGW before switching to MSVC;
# biome ships MSVC. There is a small risk of edge-case unwind/symbol
# collision issues — we accept it because the alternative (cargo-xwin MSVC
# base image + duplicate cross-toolchain plumbing) doubles the base image
# maintenance burden.
#
# ============================================================================
# RELATED FILES
# ============================================================================
#
# Base images (built manually, pushed to ghcr.io):
#   docker/builder-base/*.Dockerfile
#   scripts/docker-builder-base/build-push.sh
#
# Build Dockerfiles (one per target, used by this workflow):
#   docker/build/{linux,darwin,windows}-*.Dockerfile
#
# Each build Dockerfile takes these args:
#   BASE_TAG        — ghcr.io tag of the base image
#   BUILD_TARGET    — "engine" or "rivetkit-native"
#   BUILD_MODE      — "debug" (fast, default here) or "release"
#   BUILD_FRONTEND  — "true" or "false" (engine only)
#
# ============================================================================

name: Preview Publish

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

# Base image tag pinned here. Update after rebuilding base images with
# scripts/docker-builder-base/build-push.sh all --push.
env:
  BASE_TAG: 0e33ceb98
  BUILD_MODE: debug
  # Depot project ID (rivet-dev/rivet-engine) — used for remote builds and sccache.
  DEPOT_PROJECT_ID: 1rcpv5rn8n

jobs:
  build:
    name: "Build ${{ matrix.name }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          # rivetkit-native addon: 6 platforms (gnu + musl + darwin, no windows).
          # Windows is excluded because napi-rs does not support windows-gnu and
          # we don't ship a cargo-xwin MSVC base image.
          - name: rivetkit-native (linux-x64-gnu)
            build_target: rivetkit-native
            docker: docker/build/linux-x64-gnu.Dockerfile
            artifact: rivetkit-native.linux-x64-gnu.node
            upload_prefix: native
            platform: linux-x64-gnu
          - name: rivetkit-native (linux-x64-musl)
            build_target: rivetkit-native
            docker: docker/build/linux-x64-musl.Dockerfile
            artifact: rivetkit-native.linux-x64-musl.node
            upload_prefix: native
            platform: linux-x64-musl
          - name: rivetkit-native (linux-arm64-gnu)
            build_target: rivetkit-native
            docker: docker/build/linux-arm64-gnu.Dockerfile
            artifact: rivetkit-native.linux-arm64-gnu.node
            upload_prefix: native
            platform: linux-arm64-gnu
          - name: rivetkit-native (linux-arm64-musl)
            build_target: rivetkit-native
            docker: docker/build/linux-arm64-musl.Dockerfile
            artifact: rivetkit-native.linux-arm64-musl.node
            upload_prefix: native
            platform: linux-arm64-musl
          - name: rivetkit-native (darwin-x64)
            build_target: rivetkit-native
            docker: docker/build/darwin-x64.Dockerfile
            artifact: rivetkit-native.darwin-x64.node
            upload_prefix: native
            platform: darwin-x64
          - name: rivetkit-native (darwin-arm64)
            build_target: rivetkit-native
            docker: docker/build/darwin-arm64.Dockerfile
            artifact: rivetkit-native.darwin-arm64.node
            upload_prefix: native
            platform: darwin-arm64
          # engine binary: 5 platforms (musl for Linux, darwin, windows-gnu).
          # linux-arm64-gnu is skipped because the base image does not have
          # aarch64 OpenSSL; use linux-arm64-musl for ARM Linux engine.
          - name: engine (linux-x64-musl)
            build_target: engine
            docker: docker/build/linux-x64-musl.Dockerfile
            artifact: rivet-engine-x86_64-unknown-linux-musl
            upload_prefix: engine
            platform: linux-x64-musl
          - name: engine (linux-arm64-musl)
            build_target: engine
            docker: docker/build/linux-arm64-musl.Dockerfile
            artifact: rivet-engine-aarch64-unknown-linux-musl
            upload_prefix: engine
            platform: linux-arm64-musl
          - name: engine (darwin-x64)
            build_target: engine
            docker: docker/build/darwin-x64.Dockerfile
            artifact: rivet-engine-x86_64-apple-darwin
            upload_prefix: engine
            platform: darwin-x64
          - name: engine (darwin-arm64)
            build_target: engine
            docker: docker/build/darwin-arm64.Dockerfile
            artifact: rivet-engine-aarch64-apple-darwin
            upload_prefix: engine
            platform: darwin-arm64
          # TODO: Windows is ~13 min (MinGW ld is slow + lld link-time +
          # static-libgcc). Disabled for preview publishes since it's the
          # wall-clock bottleneck. Re-enable once the linker story is faster
          # (lld-link + cargo-xwin + MSVC base image) or if we specifically
          # need Windows engine binaries in previews.
          # - name: engine (windows-x64)
          #   build_target: engine
          #   docker: docker/build/windows-x64.Dockerfile
          #   artifact: rivet-engine-x86_64-pc-windows-gnu.exe
          #   upload_prefix: engine
          #   platform: windows-x64
    runs-on: depot-ubuntu-24.04-8
    permissions:
      contents: read
      id-token: write  # required for depot OIDC trust
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: depot/setup-action@v1

      # depot build's remote builder needs auth to pull from ghcr.io.
      # docker login here puts creds in ~/.docker/config.json which depot
      # propagates to the remote builder.
      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build via depot
        env:
          DEPOT_TOKEN: ${{ secrets.DEPOT_TOKEN }}
        run: |
          # DEPOT_TOKEN is a depot_project_* token passed as a BuildKit secret.
          # The build Dockerfiles mount it as SCCACHE_WEBDAV_TOKEN so sccache
          # can write to https://cache.depot.dev for this project.
          depot build \
            --project ${{ env.DEPOT_PROJECT_ID }} \
            --secret id=DEPOT_TOKEN,env=DEPOT_TOKEN \
            --build-arg BASE_TAG=${{ env.BASE_TAG }} \
            --build-arg BUILD_TARGET=${{ matrix.build_target }} \
            --build-arg BUILD_MODE=${{ env.BUILD_MODE }} \
            --build-arg BUILD_FRONTEND=false \
            -f ${{ matrix.docker }} \
            -t builder-${{ matrix.build_target }}-${{ matrix.platform }} \
            --load \
            .
          CONTAINER_ID=$(docker create builder-${{ matrix.build_target }}-${{ matrix.platform }})
          mkdir -p artifacts
          docker cp "$CONTAINER_ID:/artifacts/${{ matrix.artifact }}" artifacts/
          docker rm "$CONTAINER_ID"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.upload_prefix }}-${{ matrix.platform }}
          path: artifacts/${{ matrix.artifact }}
          if-no-files-found: error

  publish:
    name: "Publish"
    needs: build
    if: ${{ !cancelled() && needs.build.result != 'failure' }}
    runs-on: depot-ubuntu-24.04-8
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          path: native-artifacts
          pattern: native-*
          merge-multiple: true

      - name: Download engine artifacts
        uses: actions/download-artifact@v4
        with:
          path: engine-artifacts
          pattern: engine-*
          merge-multiple: true

      - name: Place native binaries in platform packages
        run: |
          NATIVE_DIR=rivetkit-typescript/packages/rivetkit-native
          for f in native-artifacts/*.node; do
            filename=$(basename "$f")
            # Strip "rivetkit-native." prefix and ".node" suffix.
            platform="${filename#rivetkit-native.}"
            platform="${platform%.node}"
            mkdir -p "${NATIVE_DIR}/npm/${platform}"
            cp "$f" "${NATIVE_DIR}/npm/${platform}/"
            echo "Placed $filename -> npm/${platform}/"
          done

      - name: Place engine binaries in engine-cli platform packages
        run: |
          ENGINE_CLI_DIR=rivetkit-typescript/packages/engine-cli/npm
          declare -A TRIPLE_TO_PLATFORM=(
            [rivet-engine-x86_64-unknown-linux-musl]=linux-x64-musl
            [rivet-engine-aarch64-unknown-linux-musl]=linux-arm64-musl
            [rivet-engine-x86_64-apple-darwin]=darwin-x64
            [rivet-engine-aarch64-apple-darwin]=darwin-arm64
          )
          for f in engine-artifacts/rivet-engine-*; do
            [ -e "$f" ] || continue
            filename=$(basename "$f")
            platform="${TRIPLE_TO_PLATFORM[$filename]:-}"
            if [ -z "$platform" ]; then
              echo "Skipping unknown engine artifact: $filename"
              continue
            fi
            dest="${ENGINE_CLI_DIR}/${platform}"
            if [ ! -d "$dest" ]; then
              echo "Missing engine-cli platform dir: $dest" >&2
              exit 1
            fi
            cp "$f" "$dest/rivet-engine"
            chmod +x "$dest/rivet-engine"
            echo "Placed $filename -> npm/${platform}/rivet-engine"
          done

      # Build TypeScript packages. The turbo dep graph transitively runs
      # rivetkit-native's `build` script (because rivetkit depends on it) —
      # our smart build.mjs detects the prebuilt .node files placed above
      # and skips the redundant napi build, saving ~2 min.
      - name: Build TypeScript packages
        run: pnpm build -F rivetkit -F '@rivetkit/*' -F '!@rivetkit/shared-data' -F '!@rivetkit/engine-frontend' -F '!@rivetkit/mcp-hub' -F '!@rivetkit/sqlite-native' -F '!@rivetkit/rivetkit-native'

      - run: npx turbo build:pack-inspector -F rivetkit

      - name: Strip inspector sourcemaps
        run: |
          cd rivetkit-typescript/packages/rivetkit/dist
          mkdir -p /tmp/inspector-repack
          tar xzf inspector.tar.gz -C /tmp/inspector-repack
          find /tmp/inspector-repack -name '*.map' -delete
          tar czf inspector.tar.gz -C /tmp/inspector-repack .
          rm -rf /tmp/inspector-repack

      - name: Compute pre-release version
        id: version
        run: |
          BASE_VERSION=$(node -e "console.log(require('./rivetkit-typescript/packages/rivetkit-native/package.json').version)")
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            PRE_VERSION="${BASE_VERSION}-pr.${PR_NUMBER}.${SHORT_SHA}"
            NPM_TAG="pr-${PR_NUMBER}"
          else
            PRE_VERSION="${BASE_VERSION}-main.${SHORT_SHA}"
            NPM_TAG="main"
          fi
          echo "version=${PRE_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${NPM_TAG}" >> $GITHUB_OUTPUT
          echo "Publishing all packages as ${PRE_VERSION} with tag ${NPM_TAG}"

      - name: Set pre-release version on all packages
        run: |
          pnpm --filter=preview-publish exec tsx bump-versions.ts \
            --version "${{ steps.version.outputs.version }}"

      - name: Publish all packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm --filter=preview-publish exec tsx publish-all.ts \
            --tag "${{ steps.version.outputs.tag }}" \
            --parallel 16 \
            --retries 3

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NPM_TAG="${{ steps.version.outputs.tag }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          BODY="## Preview packages published to npm

          Install with:
          \`\`\`sh
          npm install rivetkit@${NPM_TAG}
          \`\`\`

          All packages published as \`${VERSION}\` with tag \`${NPM_TAG}\`.

          Native platforms: linux-x64-gnu, linux-x64-musl, linux-arm64-gnu, linux-arm64-musl, darwin-x64, darwin-arm64, win32-x64-msvc

          Engine binary is shipped via \`@rivetkit/engine-cli\` (platforms: linux-x64-musl, linux-arm64-musl, darwin-x64, darwin-arm64). \`rivetkit\` resolves it automatically at runtime.

          <details>
          <summary>Individual packages</summary>

          \`\`\`sh
          npm install rivetkit@${NPM_TAG}
          npm install @rivetkit/react@${NPM_TAG}
          npm install @rivetkit/rivetkit-native@${NPM_TAG}
          npm install @rivetkit/sqlite-wasm@${NPM_TAG}
          npm install @rivetkit/workflow-engine@${NPM_TAG}
          \`\`\`

          </details>"

          # Update existing comment or create new one.
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments --jq '.[] | select(.body | contains("Preview packages published to npm")) | .id' | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} -X PATCH -f body="$BODY"
          else
            gh pr comment "$PR_NUMBER" --body "$BODY"
          fi
