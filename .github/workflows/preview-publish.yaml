# =============================================================================
# Preview Publish
# =============================================================================
#
# Builds and publishes preview versions of all packages on every PR and push
# to main. Builds are performed in DEBUG mode for speed (~5 min vs ~15 min
# for release). Preview versions are published to npm with a PR-scoped tag:
#
#   Version: {base}-pr.{pr_number}.{sha}  (PRs)
#            {base}-main.{sha}            (main)
#   Tag:     pr-{pr_number}               (PRs)
#            main                         (main)
#
# Install with:
#   npm install rivetkit@pr-4600
#
# ============================================================================
# PRIOR ART
# ============================================================================
#
# This workflow follows conventions from the napi-rs ecosystem. Similar patterns
# used by:
#
# - @next/swc (Next.js):
#   https://github.com/vercel/next.js/tree/canary/packages/next-swc
# - swc-project/swc:
#   https://github.com/swc-project/swc/blob/main/.github/workflows/publish-npm-package.yml
# - oxc-project/oxc:
#   https://github.com/oxc-project/oxc/tree/main/.github/workflows
# - web-infra-dev/rspack:
#   https://github.com/web-infra-dev/rspack/blob/main/.github/workflows/release.yml
# - biomejs/biome:
#   https://github.com/biomejs/biome/tree/main/.github/workflows
#
# Standard pattern: N parallel jobs (one per target triple), each producing a
# platform-specific .node file; final publish job assembles optionalDependencies
# on the meta package and publishes all platform packages + the meta package to
# npm under a pre-release dist-tag.
#
# ============================================================================
# ALPINE LINUX & NODE.JS SHARP EDGES
# ============================================================================
#
# Node native addons must match the libc of the Node binary loading them.
# A glibc-linked .node file cannot be loaded by musl-linked Node (Alpine) and
# vice versa.
#
# - Official Node from nodejs.org: glibc-linked
# - NodeSource apt packages: glibc-linked
# - node:22-slim / node:22-bookworm Docker: glibc-linked (glibc 2.36)
# - node:22-alpine Docker: musl-linked
# - Alpine Linux `apk add nodejs`: musl-linked
#
# To cover both, we ship platform-specific packages:
#   @rivetkit/rivetkit-native-linux-x64-gnu   (glibc; most Linux distros)
#   @rivetkit/rivetkit-native-linux-x64-musl  (musl; Alpine, distroless, scratch)
# The generated index.js loader uses napi-rs's isMusl() heuristic to pick one
# at runtime. This mirrors what swc, oxc, rspack all do.
#
# glibc version:
# We build the glibc variant on Debian bullseye (glibc 2.31) — binaries built
# against an older glibc forward-compatible to newer ones. This covers
# Debian 11+, Ubuntu 20.04+, RHEL 9+, Amazon Linux 2023+.
#
# musl version:
# musl has weaker ABI guarantees than glibc. We build on a pinned musl-cross
# toolchain (musl.cc aarch64, cross-tools x86_64) and accept that users on
# very old Alpine (3.17-) or very new edge Alpine may hit occasional mismatches.
# This is the same tradeoff napi-rs's lts-alpine base image makes.
#
# MinGW vs MSVC for Windows:
# Node.js on Windows is built with MSVC, and the napi-rs convention is MSVC
# addons. We use MinGW to share a single Docker base image with the engine
# build. MinGW-built .node files load into MSVC Node.js as long as libgcc,
# libstdc++, and winpthreads are statically linked (we enforce this via
# RUSTFLAGS). swc historically shipped MinGW before switching to MSVC;
# biome ships MSVC. There is a small risk of edge-case unwind/symbol
# collision issues — we accept it because the alternative (cargo-xwin MSVC
# base image + duplicate cross-toolchain plumbing) doubles the base image
# maintenance burden.
#
# ============================================================================
# RELATED FILES
# ============================================================================
#
# Base images (built manually, pushed to ghcr.io):
#   engine/docker/builder-base/*.Dockerfile
#   scripts/docker-builder-base/build-push.sh
#
# Build Dockerfiles (one per target, used by this workflow):
#   engine/docker/build/{linux,darwin,windows}-*.Dockerfile
#
# Each build Dockerfile takes these args:
#   BASE_TAG        — ghcr.io tag of the base image
#   BUILD_TARGET    — "engine" or "rivetkit-native"
#   BUILD_MODE      — "debug" (fast, default here) or "release"
#   BUILD_FRONTEND  — "true" or "false" (engine only)
#
# ============================================================================

name: Preview Publish

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

# Base image tag pinned here. Update after rebuilding base images with
# scripts/docker-builder-base/build-push.sh all --push.
env:
  BASE_TAG: 0fafbf10c
  BUILD_MODE: debug

jobs:
  build:
    name: "Build ${{ matrix.target.name }} (${{ matrix.build_target }})"
    strategy:
      fail-fast: false
      matrix:
        build_target: [rivetkit-native, engine]
        target:
          - name: linux-x64-gnu
            docker: engine/docker/build/linux-x64-gnu.Dockerfile
            engine_artifact: rivet-engine-x86_64-unknown-linux-gnu
            native_artifact: rivetkit-native.linux-x64-gnu.node
          - name: linux-x64-musl
            docker: engine/docker/build/linux-x64-musl.Dockerfile
            engine_artifact: rivet-engine-x86_64-unknown-linux-musl
            native_artifact: rivetkit-native.linux-x64-musl.node
          - name: linux-arm64-gnu
            docker: engine/docker/build/linux-arm64-gnu.Dockerfile
            engine_artifact: rivet-engine-aarch64-unknown-linux-gnu
            native_artifact: rivetkit-native.linux-arm64-gnu.node
          - name: linux-arm64-musl
            docker: engine/docker/build/linux-arm64-musl.Dockerfile
            engine_artifact: rivet-engine-aarch64-unknown-linux-musl
            native_artifact: rivetkit-native.linux-arm64-musl.node
          - name: darwin-x64
            docker: engine/docker/build/darwin-x64.Dockerfile
            engine_artifact: rivet-engine-x86_64-apple-darwin
            native_artifact: rivetkit-native.darwin-x64.node
          - name: darwin-arm64
            docker: engine/docker/build/darwin-arm64.Dockerfile
            engine_artifact: rivet-engine-aarch64-apple-darwin
            native_artifact: rivetkit-native.darwin-arm64.node
          - name: windows-x64
            docker: engine/docker/build/windows-x64.Dockerfile
            engine_artifact: rivet-engine-x86_64-pc-windows-gnu.exe
            native_artifact: rivetkit-native.win32-x64-msvc.node
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute artifact path
        id: artifact
        run: |
          if [ "${{ matrix.build_target }}" = "engine" ]; then
            echo "name=${{ matrix.target.engine_artifact }}" >> $GITHUB_OUTPUT
            echo "upload_name=engine-${{ matrix.target.name }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ matrix.target.native_artifact }}" >> $GITHUB_OUTPUT
            echo "upload_name=native-${{ matrix.target.name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build via Docker
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --build-arg BASE_TAG=${{ env.BASE_TAG }} \
            --build-arg BUILD_TARGET=${{ matrix.build_target }} \
            --build-arg BUILD_MODE=${{ env.BUILD_MODE }} \
            --build-arg BUILD_FRONTEND=false \
            -f ${{ matrix.target.docker }} \
            -t builder-${{ matrix.build_target }}-${{ matrix.target.name }} \
            .
          CONTAINER_ID=$(docker create builder-${{ matrix.build_target }}-${{ matrix.target.name }})
          mkdir -p artifacts
          docker cp "$CONTAINER_ID:/artifacts/${{ steps.artifact.outputs.name }}" artifacts/
          docker rm "$CONTAINER_ID"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.upload_name }}
          path: artifacts/${{ steps.artifact.outputs.name }}
          if-no-files-found: error

  publish:
    name: "Publish"
    needs: build
    if: ${{ !cancelled() && needs.build.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install

      - name: Build TypeScript packages
        run: pnpm build -F rivetkit -F '@rivetkit/*' -F '!@rivetkit/shared-data' -F '!@rivetkit/engine-frontend' -F '!@rivetkit/mcp-hub' -F '!@rivetkit/sqlite-native' -F '!@rivetkit/rivetkit-native'

      - run: npx turbo build:pack-inspector -F rivetkit

      - name: Strip inspector sourcemaps
        run: |
          cd rivetkit-typescript/packages/rivetkit/dist
          mkdir -p /tmp/inspector-repack
          tar xzf inspector.tar.gz -C /tmp/inspector-repack
          find /tmp/inspector-repack -name '*.map' -delete
          tar czf inspector.tar.gz -C /tmp/inspector-repack .
          rm -rf /tmp/inspector-repack

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          path: native-artifacts
          pattern: native-*
          merge-multiple: true

      - name: Download engine artifacts
        uses: actions/download-artifact@v4
        with:
          path: engine-artifacts
          pattern: engine-*
          merge-multiple: true

      - name: Place native binaries in platform packages
        run: |
          NATIVE_DIR=rivetkit-typescript/packages/rivetkit-native
          for f in native-artifacts/*.node; do
            filename=$(basename "$f")
            # Strip "rivetkit-native." prefix and ".node" suffix.
            platform="${filename#rivetkit-native.}"
            platform="${platform%.node}"
            mkdir -p "${NATIVE_DIR}/npm/${platform}"
            cp "$f" "${NATIVE_DIR}/npm/${platform}/"
            echo "Placed $filename -> npm/${platform}/"
          done

      - name: Compute pre-release version
        id: version
        run: |
          BASE_VERSION=$(node -e "console.log(require('./rivetkit-typescript/packages/rivetkit-native/package.json').version)")
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            PRE_VERSION="${BASE_VERSION}-pr.${PR_NUMBER}.${SHORT_SHA}"
            NPM_TAG="pr-${PR_NUMBER}"
          else
            PRE_VERSION="${BASE_VERSION}-main.${SHORT_SHA}"
            NPM_TAG="main"
          fi
          echo "version=${PRE_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${NPM_TAG}" >> $GITHUB_OUTPUT
          echo "Publishing all packages as ${PRE_VERSION} with tag ${NPM_TAG}"

      - name: Set pre-release version on all packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Update all workspace packages.
          node -e "
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            const pkgs = JSON.parse(execSync('pnpm -r list --json').toString());

            const SKIP = new Set([
              '@rivetkit/shared-data',
              '@rivetkit/engine-frontend',
              '@rivetkit/mcp-hub',
            ]);

            for (const pkg of pkgs) {
              if (pkg.private) continue;
              if (SKIP.has(pkg.name)) continue;
              if (!pkg.name.startsWith('@rivetkit/') && pkg.name !== 'rivetkit') continue;

              const pkgJsonPath = path.join(pkg.path, 'package.json');
              const pkgJson = JSON.parse(fs.readFileSync(pkgJsonPath, 'utf8'));
              pkgJson.version = '${VERSION}';

              for (const depType of ['dependencies', 'devDependencies', 'peerDependencies', 'optionalDependencies']) {
                if (!pkgJson[depType]) continue;
                for (const [dep, ver] of Object.entries(pkgJson[depType])) {
                  if (ver === 'workspace:*' && (dep.startsWith('@rivetkit/') || dep === 'rivetkit')) {
                    pkgJson[depType][dep] = '${VERSION}';
                  }
                }
              }

              fs.writeFileSync(pkgJsonPath, JSON.stringify(pkgJson, null, '\t') + '\n');
              console.log('Updated', pkg.name, '->', '${VERSION}');
            }
          "

          # Update native platform packages and add optionalDependencies.
          NATIVE_DIR=rivetkit-typescript/packages/rivetkit-native
          for dir in ${NATIVE_DIR}/npm/*/; do
            if [ -f "${dir}package.json" ]; then
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('${dir}package.json', 'utf8'));
                pkg.version = '${VERSION}';
                fs.writeFileSync('${dir}package.json', JSON.stringify(pkg, null, '\t') + '\n');
              "
            fi
          done

          node -e "
            const fs = require('fs');
            const path = require('path');
            const pkg = JSON.parse(fs.readFileSync('${NATIVE_DIR}/package.json', 'utf8'));
            const npmDirs = fs.readdirSync('${NATIVE_DIR}/npm').filter(d =>
              fs.statSync(path.join('${NATIVE_DIR}/npm', d)).isDirectory() &&
              fs.existsSync(path.join('${NATIVE_DIR}/npm', d, 'package.json'))
            );
            pkg.optionalDependencies = pkg.optionalDependencies || {};
            for (const dir of npmDirs) {
              const platPkg = JSON.parse(fs.readFileSync(path.join('${NATIVE_DIR}/npm', dir, 'package.json'), 'utf8'));
              pkg.optionalDependencies[platPkg.name] = '${VERSION}';
            }
            fs.writeFileSync('${NATIVE_DIR}/package.json', JSON.stringify(pkg, null, '\t') + '\n');
          "

          # Update engine SDK packages.
          for dir in engine/sdks/typescript/*/; do
            if [ -f "${dir}package.json" ]; then
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('${dir}package.json', 'utf8'));
                if (pkg.private) process.exit(0);
                pkg.version = '${VERSION}';
                for (const depType of ['dependencies', 'devDependencies', 'peerDependencies']) {
                  if (!pkg[depType]) continue;
                  for (const [dep, ver] of Object.entries(pkg[depType])) {
                    if (String(ver) === 'workspace:*' && (dep.startsWith('@rivetkit/') || dep === 'rivetkit')) {
                      pkg[depType][dep] = '${VERSION}';
                    }
                  }
                }
                fs.writeFileSync('${dir}package.json', JSON.stringify(pkg, null, '\t') + '\n');
                console.log('Updated', pkg.name, '->', '${VERSION}');
              "
            fi
          done

          # Update shared/typescript packages.
          for dir in shared/typescript/*/; do
            if [ -f "${dir}package.json" ]; then
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('${dir}package.json', 'utf8'));
                if (pkg.private) process.exit(0);
                pkg.version = '${VERSION}';
                fs.writeFileSync('${dir}package.json', JSON.stringify(pkg, null, '\t') + '\n');
                console.log('Updated', pkg.name, '->', '${VERSION}');
              "
            fi
          done

      - name: Publish all packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NPM_TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Publish native platform packages first (optionalDependencies of the meta).
          NATIVE_DIR=rivetkit-typescript/packages/rivetkit-native
          for dir in ${NATIVE_DIR}/npm/*/; do
            if [ -f "${dir}package.json" ]; then
              NAME=$(node -e "console.log(require('./${dir}package.json').name)")
              echo "Publishing ${NAME}@${VERSION}..."
              (cd "$dir" && npm publish --access public --tag "$NPM_TAG") || true
            fi
          done

          # Publish workspace packages.
          PACKAGES=$(node -e "
            const { execSync } = require('child_process');
            const pkgs = JSON.parse(execSync('pnpm -r list --json').toString());
            const SKIP = new Set([
              '@rivetkit/shared-data',
              '@rivetkit/engine-frontend',
              '@rivetkit/mcp-hub',
            ]);
            const names = pkgs
              .filter(p => !p.private && !SKIP.has(p.name))
              .filter(p => p.name.startsWith('@rivetkit/') || p.name === 'rivetkit')
              .map(p => p.name);
            console.log(names.join('\n'));
          ")

          for name in $PACKAGES; do
            echo "Publishing ${name}@${VERSION}..."
            pnpm --filter "$name" publish --access public --tag "$NPM_TAG" --no-git-checks || true
          done

          # Publish engine SDK packages.
          for dir in engine/sdks/typescript/*/; do
            if [ -f "${dir}package.json" ]; then
              IS_PRIVATE=$(node -e "console.log(require('./${dir}package.json').private || false)")
              if [ "$IS_PRIVATE" = "false" ]; then
                NAME=$(node -e "console.log(require('./${dir}package.json').name)")
                echo "Publishing ${NAME}@${VERSION}..."
                (cd "$dir" && npm publish --access public --tag "$NPM_TAG") || true
              fi
            fi
          done

          # Publish shared typescript packages.
          for dir in shared/typescript/*/; do
            if [ -f "${dir}package.json" ]; then
              IS_PRIVATE=$(node -e "console.log(require('./${dir}package.json').private || false)")
              if [ "$IS_PRIVATE" = "false" ]; then
                NAME=$(node -e "console.log(require('./${dir}package.json').name)")
                echo "Publishing ${NAME}@${VERSION}..."
                (cd "$dir" && npm publish --access public --tag "$NPM_TAG") || true
              fi
            fi
          done

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NPM_TAG="${{ steps.version.outputs.tag }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          BODY="## Preview packages published to npm

          Install with:
          \`\`\`sh
          npm install rivetkit@${NPM_TAG}
          \`\`\`

          All packages published as \`${VERSION}\` with tag \`${NPM_TAG}\`.

          Native platforms: linux-x64-gnu, linux-x64-musl, linux-arm64-gnu, linux-arm64-musl, darwin-x64, darwin-arm64, win32-x64-msvc

          Engine binaries are available as downloadable GitHub Actions artifacts on this workflow run.

          <details>
          <summary>Individual packages</summary>

          \`\`\`sh
          npm install rivetkit@${NPM_TAG}
          npm install @rivetkit/react@${NPM_TAG}
          npm install @rivetkit/rivetkit-native@${NPM_TAG}
          npm install @rivetkit/sqlite-wasm@${NPM_TAG}
          npm install @rivetkit/workflow-engine@${NPM_TAG}
          \`\`\`

          </details>"

          # Update existing comment or create new one.
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments --jq '.[] | select(.body | contains("Preview packages published to npm")) | .id' | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} -X PATCH -f body="$BODY"
          else
            gh pr comment "$PR_NUMBER" --body "$BODY"
          fi
