# Preview publish: builds and publishes all packages to npm as pre-release versions.
# Triggered on every PR and push to main.
#
# Version format: {base}-pr.{pr_number}.{sha} (PRs) or {base}-main.{sha} (main)
# Install with: npm install rivetkit@pr-{number}
#
# Reference: swc uses a similar napi-rs cross-compile + npm pre-release pattern
# https://github.com/swc-project/swc/blob/main/.github/workflows/publish-npm-package.yml

name: Preview Publish

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-native:
    name: "Build native (${{ matrix.settings.target }})"
    strategy:
      fail-fast: false
      matrix:
        settings:
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-latest
            docker: rivetkit-typescript/packages/rivetkit-native/docker/linux-x64.Dockerfile
            artifact: rivetkit-native.linux-x64-gnu.node
          - target: aarch64-apple-darwin
            host: ubuntu-latest
            docker: rivetkit-typescript/packages/rivetkit-native/docker/macos-arm64.Dockerfile
            artifact: rivetkit-native.darwin-arm64.node
          - target: x86_64-apple-darwin
            host: ubuntu-latest
            docker: rivetkit-typescript/packages/rivetkit-native/docker/macos-x64.Dockerfile
            artifact: rivetkit-native.darwin-x64.node
          - target: x86_64-pc-windows-msvc
            host: ubuntu-latest
            docker: rivetkit-typescript/packages/rivetkit-native/docker/windows-x64.Dockerfile
            artifact: rivetkit-native.win32-x64-msvc.node
    runs-on: ${{ matrix.settings.host }}
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build native binary via Docker
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -f ${{ matrix.settings.docker }} \
            -t rivetkit-native-builder-${{ matrix.settings.target }} \
            .
          CONTAINER_ID=$(docker create rivetkit-native-builder-${{ matrix.settings.target }})
          mkdir -p artifacts
          docker cp "$CONTAINER_ID:/artifacts/${{ matrix.settings.artifact }}" artifacts/
          docker rm "$CONTAINER_ID"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: artifacts/${{ matrix.settings.artifact }}
          if-no-files-found: error

  build-engine:
    name: "Build engine (${{ matrix.settings.target }})"
    strategy:
      fail-fast: false
      matrix:
        settings:
          - target: x86_64-unknown-linux-musl
            host: ubuntu-latest
            docker: engine/docker/engine/linux-x86_64.Dockerfile
            stage: x86_64-builder
            artifact: rivet-engine-x86_64-unknown-linux-musl
          - target: aarch64-apple-darwin
            host: ubuntu-latest
            docker: engine/docker/engine/macos-aarch64.Dockerfile
            stage: aarch64-builder
            artifact: rivet-engine-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            host: ubuntu-latest
            docker: engine/docker/engine/macos-x86_64.Dockerfile
            stage: x86_64-builder
            artifact: rivet-engine-x86_64-apple-darwin
          - target: x86_64-pc-windows-gnu
            host: ubuntu-latest
            docker: engine/docker/engine/windows.Dockerfile
            stage: ""
            artifact: rivet-engine-x86_64-pc-windows-gnu.exe
    runs-on: ${{ matrix.settings.host }}
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build engine binary via Docker
        run: |
          BUILD_ARGS="--build-arg BUILD_FRONTEND=false"
          if [ -n "${{ matrix.settings.stage }}" ]; then
            BUILD_ARGS="$BUILD_ARGS --target ${{ matrix.settings.stage }}"
          fi
          DOCKER_BUILDKIT=1 docker build \
            $BUILD_ARGS \
            -f ${{ matrix.settings.docker }} \
            -t engine-builder-${{ matrix.settings.target }} \
            .
          CONTAINER_ID=$(docker create engine-builder-${{ matrix.settings.target }})
          mkdir -p artifacts
          docker cp "$CONTAINER_ID:/artifacts/${{ matrix.settings.artifact }}" artifacts/
          docker rm "$CONTAINER_ID"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: engine-${{ matrix.settings.target }}
          path: artifacts/${{ matrix.settings.artifact }}
          if-no-files-found: error

  publish:
    name: "Publish"
    needs: [build-native, build-engine]
    if: ${{ !cancelled() && needs.build-native.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install

      - name: Build TypeScript packages
        run: pnpm build -F rivetkit -F '@rivetkit/*' -F '!@rivetkit/shared-data' -F '!@rivetkit/engine-frontend' -F '!@rivetkit/mcp-hub' -F '!@rivetkit/sqlite-native' -F '!@rivetkit/rivetkit-native'

      - run: npx turbo build:pack-inspector -F rivetkit
      - name: Strip inspector sourcemaps
        run: |
          cd rivetkit-typescript/packages/rivetkit/dist
          mkdir -p /tmp/inspector-repack
          tar xzf inspector.tar.gz -C /tmp/inspector-repack
          find /tmp/inspector-repack -name '*.map' -delete
          tar czf inspector.tar.gz -C /tmp/inspector-repack .
          rm -rf /tmp/inspector-repack

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          path: native-artifacts
          pattern: bindings-*
          merge-multiple: true

      - name: Download engine artifacts
        uses: actions/download-artifact@v4
        with:
          path: engine-artifacts
          pattern: engine-*
          merge-multiple: true

      - name: Place native binaries in platform packages
        run: |
          NATIVE_DIR=rivetkit-typescript/packages/rivetkit-native
          for f in native-artifacts/*.node; do
            filename=$(basename "$f")
            platform="${filename#rivetkit-native.}"
            platform="${platform%.node}"
            mkdir -p "${NATIVE_DIR}/npm/${platform}"
            cp "$f" "${NATIVE_DIR}/npm/${platform}/"
            echo "Placed $filename -> npm/${platform}/"
          done

      - name: Place engine binaries in engine package
        run: |
          ENGINE_DIR=rivetkit-typescript/packages/engine/bin
          mkdir -p "$ENGINE_DIR"
          for f in engine-artifacts/rivet-engine-*; do
            filename=$(basename "$f")
            cp "$f" "$ENGINE_DIR/"
            chmod +x "$ENGINE_DIR/$filename"
            echo "Placed engine: $filename"
          done

      - name: Compute pre-release version
        id: version
        run: |
          BASE_VERSION=$(node -e "console.log(require('./rivetkit-typescript/packages/rivetkit-native/package.json').version)")
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            PRE_VERSION="${BASE_VERSION}-pr.${PR_NUMBER}.${SHORT_SHA}"
            NPM_TAG="pr-${PR_NUMBER}"
          else
            PRE_VERSION="${BASE_VERSION}-main.${SHORT_SHA}"
            NPM_TAG="main"
          fi
          echo "version=${PRE_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${NPM_TAG}" >> $GITHUB_OUTPUT
          echo "Publishing all packages as ${PRE_VERSION} with tag ${NPM_TAG}"

      - name: Set pre-release version on all packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Update all workspace packages
          node -e "
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            const pkgs = JSON.parse(execSync('pnpm -r list --json').toString());

            const SKIP = new Set([
              '@rivetkit/shared-data',
              '@rivetkit/engine-frontend',
              '@rivetkit/mcp-hub',
            ]);

            for (const pkg of pkgs) {
              if (pkg.private) continue;
              if (SKIP.has(pkg.name)) continue;
              if (!pkg.name.startsWith('@rivetkit/') && pkg.name !== 'rivetkit') continue;

              const pkgJsonPath = path.join(pkg.path, 'package.json');
              const pkgJson = JSON.parse(fs.readFileSync(pkgJsonPath, 'utf8'));
              pkgJson.version = '${VERSION}';

              for (const depType of ['dependencies', 'devDependencies', 'peerDependencies', 'optionalDependencies']) {
                if (!pkgJson[depType]) continue;
                for (const [dep, ver] of Object.entries(pkgJson[depType])) {
                  if (ver === 'workspace:*' && (dep.startsWith('@rivetkit/') || dep === 'rivetkit')) {
                    pkgJson[depType][dep] = '${VERSION}';
                  }
                }
              }

              fs.writeFileSync(pkgJsonPath, JSON.stringify(pkgJson, null, '\t') + '\n');
              console.log('Updated', pkg.name, '->', '${VERSION}');
            }
          "

          # Update native platform packages and add optionalDependencies
          NATIVE_DIR=rivetkit-typescript/packages/rivetkit-native
          for dir in ${NATIVE_DIR}/npm/*/; do
            if [ -f "${dir}package.json" ]; then
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('${dir}package.json', 'utf8'));
                pkg.version = '${VERSION}';
                fs.writeFileSync('${dir}package.json', JSON.stringify(pkg, null, '\t') + '\n');
              "
            fi
          done

          node -e "
            const fs = require('fs');
            const path = require('path');
            const pkg = JSON.parse(fs.readFileSync('${NATIVE_DIR}/package.json', 'utf8'));
            const npmDirs = fs.readdirSync('${NATIVE_DIR}/npm').filter(d =>
              fs.statSync(path.join('${NATIVE_DIR}/npm', d)).isDirectory() &&
              fs.existsSync(path.join('${NATIVE_DIR}/npm', d, 'package.json'))
            );
            pkg.optionalDependencies = pkg.optionalDependencies || {};
            for (const dir of npmDirs) {
              const platPkg = JSON.parse(fs.readFileSync(path.join('${NATIVE_DIR}/npm', dir, 'package.json'), 'utf8'));
              pkg.optionalDependencies[platPkg.name] = '${VERSION}';
            }
            fs.writeFileSync('${NATIVE_DIR}/package.json', JSON.stringify(pkg, null, '\t') + '\n');
          "

          # Update engine SDK packages
          for dir in engine/sdks/typescript/*/; do
            if [ -f "${dir}package.json" ]; then
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('${dir}package.json', 'utf8'));
                if (pkg.private) process.exit(0);
                pkg.version = '${VERSION}';
                for (const depType of ['dependencies', 'devDependencies', 'peerDependencies']) {
                  if (!pkg[depType]) continue;
                  for (const [dep, ver] of Object.entries(pkg[depType])) {
                    if (String(ver) === 'workspace:*' && (dep.startsWith('@rivetkit/') || dep === 'rivetkit')) {
                      pkg[depType][dep] = '${VERSION}';
                    }
                  }
                }
                fs.writeFileSync('${dir}package.json', JSON.stringify(pkg, null, '\t') + '\n');
                console.log('Updated', pkg.name, '->', '${VERSION}');
              "
            fi
          done

          # Update shared/typescript packages
          for dir in shared/typescript/*/; do
            if [ -f "${dir}package.json" ]; then
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('${dir}package.json', 'utf8'));
                if (pkg.private) process.exit(0);
                pkg.version = '${VERSION}';
                fs.writeFileSync('${dir}package.json', JSON.stringify(pkg, null, '\t') + '\n');
                console.log('Updated', pkg.name, '->', '${VERSION}');
              "
            fi
          done

      - name: Publish all packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NPM_TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Publish native platform packages first (they are optionalDependencies)
          NATIVE_DIR=rivetkit-typescript/packages/rivetkit-native
          for dir in ${NATIVE_DIR}/npm/*/; do
            if [ -f "${dir}package.json" ]; then
              NAME=$(node -e "console.log(require('./${dir}package.json').name)")
              echo "Publishing ${NAME}@${VERSION}..."
              (cd "$dir" && npm publish --access public --tag "$NPM_TAG") || true
            fi
          done

          # Publish all workspace packages
          PACKAGES=$(node -e "
            const { execSync } = require('child_process');
            const pkgs = JSON.parse(execSync('pnpm -r list --json').toString());
            const SKIP = new Set([
              '@rivetkit/shared-data',
              '@rivetkit/engine-frontend',
              '@rivetkit/mcp-hub',
            ]);
            const names = pkgs
              .filter(p => !p.private && !SKIP.has(p.name))
              .filter(p => p.name.startsWith('@rivetkit/') || p.name === 'rivetkit')
              .map(p => p.name);
            console.log(names.join('\n'));
          ")

          for name in $PACKAGES; do
            echo "Publishing ${name}@${VERSION}..."
            pnpm --filter "$name" publish --access public --tag "$NPM_TAG" --no-git-checks || true
          done

          # Publish engine SDK packages
          for dir in engine/sdks/typescript/*/; do
            if [ -f "${dir}package.json" ]; then
              IS_PRIVATE=$(node -e "console.log(require('./${dir}package.json').private || false)")
              if [ "$IS_PRIVATE" = "false" ]; then
                NAME=$(node -e "console.log(require('./${dir}package.json').name)")
                echo "Publishing ${NAME}@${VERSION}..."
                (cd "$dir" && npm publish --access public --tag "$NPM_TAG") || true
              fi
            fi
          done

          # Publish shared typescript packages
          for dir in shared/typescript/*/; do
            if [ -f "${dir}package.json" ]; then
              IS_PRIVATE=$(node -e "console.log(require('./${dir}package.json').private || false)")
              if [ "$IS_PRIVATE" = "false" ]; then
                NAME=$(node -e "console.log(require('./${dir}package.json').name)")
                echo "Publishing ${NAME}@${VERSION}..."
                (cd "$dir" && npm publish --access public --tag "$NPM_TAG") || true
              fi
            fi
          done

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NPM_TAG="${{ steps.version.outputs.tag }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # Check which engine binaries were built
          ENGINE_BINS=""
          for f in engine-artifacts/rivet-engine-*; do
            [ -f "$f" ] && ENGINE_BINS="${ENGINE_BINS}\n- \`$(basename $f)\`"
          done

          BODY="## Preview packages published to npm

          Install with:
          \`\`\`sh
          npm install rivetkit@${NPM_TAG}
          \`\`\`

          All packages published as \`${VERSION}\` with tag \`${NPM_TAG}\`.

          <details>
          <summary>Individual packages</summary>

          \`\`\`sh
          npm install rivetkit@${NPM_TAG}
          npm install @rivetkit/react@${NPM_TAG}
          npm install @rivetkit/rivetkit-native@${NPM_TAG}
          npm install @rivetkit/sqlite-wasm@${NPM_TAG}
          npm install @rivetkit/workflow-engine@${NPM_TAG}
          \`\`\`

          </details>

          <details>
          <summary>Engine binaries (GitHub Artifacts)</summary>

          Engine binaries are available as downloadable GitHub Actions artifacts on this workflow run.
          $(echo -e "$ENGINE_BINS")

          </details>"

          # Update existing comment or create new one
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments --jq '.[] | select(.body | contains("Preview packages published to npm")) | .id' | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} -X PATCH -f body="$BODY"
          else
            gh pr comment "$PR_NUMBER" --body "$BODY"
          fi
