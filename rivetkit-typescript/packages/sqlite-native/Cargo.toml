[package]
name = "rivetkit-sqlite-native"
version = "2.1.6"
edition = "2021"
license = "Apache-2.0"
description = "Native SQLite addon for RivetKit backed by KV channel protocol"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2", default-features = false, features = ["napi6", "async"] }
napi-derive = "2"
libsqlite3-sys = { version = "0.30", features = ["bundled"] }
tokio = { version = "1", features = ["rt-multi-thread", "sync", "net", "time", "macros"] }
tokio-tungstenite = "0.24"
serde = { version = "1", features = ["derive"] }
serde_bare = "0.5"

[build-dependencies]
napi-build = "2"

[workspace]

[profile.release]
lto = true
