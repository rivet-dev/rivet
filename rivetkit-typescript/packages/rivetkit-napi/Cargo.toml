[package]
name = "rivetkit-napi"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2", default-features = false, features = ["napi6", "async", "serde-json"] }
napi-derive = "2"
rivet-envoy-client.workspace = true
rivet-envoy-protocol.workspace = true
async-trait.workspace = true
rivetkit-sqlite-native.workspace = true
tokio.workspace = true
tokio-util.workspace = true
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
uuid.workspace = true
base64.workspace = true
hex.workspace = true
http.workspace = true
rivetkit-core.workspace = true
libsqlite3-sys = { version = "0.30", features = ["bundled"] }

[build-dependencies]
napi-build = "2"
